<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Start Here — AI Architect Academy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#94a3b8" stroke-opacity="0.15"/>
    </pattern>
    <style>
      .title{font:700 40px/1.2 'Inter',system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;fill:#0f172a}
      .sub{font:400 18px/1.6 'Inter',system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;fill:#334155}
      .step-title{font:600 18px 'Inter',system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;fill:#0f172a}
      .step-desc{font:400 14px 'Inter',system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;fill:#475569}
      .badge{font:600 12px 'Inter',system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;fill:#0e7490}
      .num{font:700 16px 'Inter',system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;fill:#0f172a}
    </style>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>
  <rect x="32" y="32" width="1136" height="496" rx="20" fill="url(#grid)"/>

  <circle cx="1080" cy="100" r="90" fill="url(#accent)" opacity="0.12"/>
  <circle cx="140" cy="470" r="110" fill="url(#accent)" opacity="0.10"/>

  <g transform="translate(72,88)">
    <text class="title">Start Here</text>
    <text class="sub" y="34" dy="28">Pick a path, ship a project, measure quality, and operate with confidence.</text>
  </g>

  <g transform="translate(72,190)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="260" height="140" rx="16" fill="#ffffff"/>
    </g>
    <circle cx="28" cy="28" r="14" fill="#bae6fd" stroke="#38bdf8"/>
    <text class="num" x="23" y="34">1</text>
    <text class="step-title" x="56" y="32">Choose a Path</text>
    <text class="step-desc" x="56" y="60">100‑Hour • Beginner • Pro • Bootcamp</text>
    <rect x="56" y="76" width="98" height="24" rx="6" fill="#e0f2fe"/>
    <text class="badge" x="66" y="92">100‑Hour</text>
  </g>

  <g transform="translate(352,190)">
    <g filter="url(#shadow)"><rect x="0" y="0" width="260" height="140" rx="16" fill="#ffffff"/></g>
    <circle cx="28" cy="28" r="14" fill="#cffafe" stroke="#06b6d4"/>
    <text class="num" x="23" y="34">2</text>
    <text class="step-title" x="56" y="32">Learn Patterns</text>
    <text class="step-desc" x="56" y="60">Value • Architecture • Risks • BoM</text>
    <rect x="56" y="76" width="120" height="24" rx="6" fill="#ecfeff"/>
    <text class="badge" x="66" y="92">Design Library</text>
  </g>

  <g transform="translate(632,190)">
    <g filter="url(#shadow)"><rect x="0" y="0" width="260" height="140" rx="16" fill="#ffffff"/></g>
    <circle cx="28" cy="28" r="14" fill="#dcfce7" stroke="#22c55e"/>
    <text class="num" x="23" y="34">3</text>
    <text class="step-title" x="56" y="32">Build a Project</text>
    <text class="step-desc" x="56" y="60">RAG • Agents • Evals • Vectors</text>
    <rect x="56" y="76" width="122" height="24" rx="6" fill="#eafff3"/>
    <text class="badge" x="66" y="92">Hands‑on Guide</text>
  </g>

  <g transform="translate(912,190)">
    <g filter="url(#shadow)"><rect x="0" y="0" width="260" height="140" rx="16" fill="#ffffff"/></g>
    <circle cx="28" cy="28" r="14" fill="#fef9c3" stroke="#eab308"/>
    <text class="num" x="23" y="34">4</text>
    <text class="step-title" x="56" y="32">Operate &amp; Govern</text>
    <text class="step-desc" x="56" y="60">SLOs • Guardrails • Observability</text>
    <rect x="56" y="76" width="128" height="24" rx="6" fill="#fff7cc"/>
    <text class="badge" x="66" y="92">Evals + SLOs</text>
  </g>

  <rect x="72" y="366" width="1056" height="1" fill="#cbd5e1" opacity="0.6"/>
  <text class="sub" x="72" y="394">Tip: Press “/” on the site to search topics and sections.</text>
</svg>
